function App() {
  const [darkMode, setDarkMode] = useState(true);
  const [screen, setScreen] = useState(SCREENS.HOME);
  const [genre, setGenre] = useState("Jazz");
  const [difficulty, setDifficulty] = useState("Beginner");
  const [history, setHistory] = useState([]);

  const [cwTimerSec, setCwTimerSec] = useState(0);
  const [soloTimerSec, setSoloTimerSec] = useState(0);
  const [miniTimerSec, setMiniTimerSec] = useState(0);
  const [grooveTimerSec, setGrooveTimerSec] = useState(0);
  const [activeGame, setActiveGame] = useState(null);
  const [timerRunning, setTimerRunning] = useState(false);

  const [colorOverride, setColorOverride] = useState(null);

  const [cwTriviaIdx, setCwTriviaIdx] = useState(0);
  const [soloTriviaIdx, setSoloTriviaIdx] = useState(0);
  const [miniTriviaIdx, setMiniTriviaIdx] = useState(0);
  const [grooveTriviaIdx, setGrooveTriviaIdx] = useState(0);

  const [cwCells, setCwCells] = useState(() => CW_GRID.map(r => r.map(c => c === "#" ? "#" : "")));
  const [cwActive, setCwActive] = useState([0,0]);
  const [cwDir, setCwDir] = useState("across");
  const [cwRevealed, setCwRevealed] = useState(false);
  const [cwDropdownOpen, setCwDropdownOpen] = useState(null);

  const [miniCells, setMiniCells] = useState(() => MINI_GRID.map(r => r.map(c => c === "#" ? "#" : "")));
  const [miniActive, setMiniActive] = useState([0,0]);
  const [miniDir, setMiniDir] = useState("across");
  const [miniDropdownOpen, setMiniDropdownOpen] = useState(null);

  const [soloGuesses, setSoloGuesses] = useState([]);
  const [soloCurrent, setSoloCurrent] = useState("");
  const [soloGameOver, setSoloGameOver] = useState(false);

  const [grooveSelected, setGrooveSelected] = useState([]);
  const [grooveFound, setGrooveFound] = useState([]);
  const [grooveWrong, setGrooveWrong] = useState(false);

  const [statsTab, setStatsTab] = useState("overview");
  const [colorPickerOpen, setColorPickerOpen] = useState(false);

  const baseTheme = GENRE_THEMES[genre][darkMode ? "dark" : "light"];
  let t = {...baseTheme};
  if (colorOverride && colorOverride !== "Default") {
    const overrideColor = COLOR_PALETTES[colorOverride];
    if (overrideColor) {
      t.accent = overrideColor;
      t.accentHover = overrideColor;
      t.accentSoft = overrideColor + "20";
      t.accentBorder = overrideColor + "40";
      t.gradient = `linear-gradient(135deg,${overrideColor} 0%,${overrideColor} 100%)`;
      t.gradientBtn = `linear-gradient(135deg,${overrideColor} 0%,${overrideColor} 100%)`;
    }
  }

  useEffect(() => {
    if (!timerRunning) return;
    const interval = setInterval(() => {
      if (activeGame === "crosswords") setCwTimerSec(s => s + 1);
      else if (activeGame === "solo") setSoloTimerSec(s => s + 1);
      else if (activeGame === "mini") setMiniTimerSec(s => s + 1);
      else if (activeGame === "groove") setGrooveTimerSec(s => s + 1);
    }, 1000);
    return () => clearInterval(interval);
  }, [timerRunning, activeGame]);

  const startGame = (gameName) => {
    setHistory(h => [...h, screen]);
    setScreen(gameName);
    setActiveGame(gameName);
    setTimerRunning(true);
  };

  const goBack = () => {
    if (history.length > 0) {
      const prev = history[history.length - 1];
      setHistory(h => h.slice(0, -1));
      setScreen(prev);
      setTimerRunning(false);
      setActiveGame(null);
    }
  };

  if (screen === SCREENS.HOME) return (
    <div style={{minHeight:"100vh",background:t.bg,transition:"background 0.35s ease",...f()}}>
      <div style={{maxWidth:420,margin:"0 auto",paddingBottom:70}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px"}}>
          <I.Note c={t.accent} s={24} />
          <div style={{display:"flex",gap:8}}>
            <button onClick={() => setDarkMode(!darkMode)} style={{background:"none",border:"none",padding:4,display:"flex",cursor:"pointer"}}>
              {darkMode ? <I.Sun c={t.muted} s={18} /> : <I.Moon c={t.muted} s={18} />}
            </button>
            <div style={{position:"relative"}}>
              <button onClick={() => setColorPickerOpen(!colorPickerOpen)} style={{background:"none",border:"none",padding:4,display:"flex",cursor:"pointer"}}>
                <I.Palette c={t.muted} s={18} />
              </button>
              {colorPickerOpen && (
                <div style={{position:"absolute",top:40,right:0,background:t.surface,border:`1px solid ${t.divider}`,borderRadius:8,padding:8,zIndex:200,minWidth:160,boxShadow:t.cardShadow}}>
                  {Object.keys(COLOR_PALETTES).map(palName => (
                    <button key={palName} onClick={() => {setColorOverride(palName);setColorPickerOpen(false);}} style={{
                      display:"block",width:"100%",padding:"8px 12px",textAlign:"left",border:"none",background:colorOverride===palName?t.accentSoft:"transparent",color:t.text,cursor:"pointer",borderRadius:4,fontSize:12,fontWeight:colorOverride===palName?600:400,transition:"background 0.2s"
                    }}>{palName}</button>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>

        <div style={{padding:"20px",textAlign:"center"}}>
          <div style={{...f(600,20),color:t.text,marginBottom:4}}>{getGreeting()}</div>
          <div style={{...f(400,13),color:t.textSecondary}}>Pick a puzzle and vibe to great music</div>
        </div>

        <div style={{display:"flex",gap:8,padding:"0 20px",marginBottom:24}}>
          {["Jazz","Rock","Pop Culture"].map(g => {
            const isActive = g === genre;
            return (
              <button key={g} onClick={() => setGenre(g)} style={{
                flex:1,padding:"10px 12px",border:"none",borderRadius:8,cursor:"pointer",
                background:isActive?t.accent:t.surface,color:isActive?t.text:"inherit",
                ...f(isActive?600:500,12),transition:"all 0.3s ease"
              }}>{g}</button>
            );
          })}
        </div>

        <div style={{padding:"0 20px",marginBottom:24}}>
          <div style={{...f(500,11),color:t.muted,marginBottom:8}}>DIFFICULTY</div>
          <div style={{display:"flex",gap:6}}>
            {["Beginner","Standard","Expert","Legendary"].map(d => {
              const isActive = d === difficulty;
              return (
                <button key={d} onClick={() => setDifficulty(d)} style={{
                  flex:1,padding:"8px",border:`1px solid ${isActive?t.accent:t.divider}`,borderRadius:6,cursor:"pointer",
                  background:isActive?t.accentSoft:"transparent",color:t.text,...f(isActive?600:400,11),transition:"all 0.2s"
                }}>{d}</button>
              );
            })}
          </div>
        </div>

        <div style={{padding:"0 20px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
          {[
            {icon:I.Cross,name:"Crosswords",scr:SCREENS.CROSSWORDS},
            {icon:I.Grid,name:"Solo",scr:SCREENS.SOLO},
            {icon:I.Tile,name:"Mini",scr:SCREENS.MINI},
            {icon:I.Wave,name:"Groove",scr:SCREENS.GROOVE},
          ].map(game => (
            <button key={game.name} onClick={() => startGame(game.scr)} style={{
              padding:"20px 12px",border:"none",borderRadius:12,background:t.surface,color:t.text,cursor:"pointer",
              ...f(600,13),transition:"all 0.3s ease",display:"flex",flexDirection:"column",alignItems:"center",gap:8
            }}>
              <game.icon c={t.accent} s={24} />
              {game.name}
            </button>
          ))}
        </div>

        <div style={{padding:"0 20px",marginBottom:24}}>
          <div style={{background:t.surface,border:`1px solid ${t.divider}`,borderRadius:12,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <I.Spotify />
              <span style={{...f(500,12),color:t.text}}>Listen on Spotify</span>
            </div>
            <div style={{...f(400,11),color:t.textSecondary,marginBottom:12}}>
              {SPOTIFY[genre].name}: {SPOTIFY[genre].desc}
            </div>
            <button style={{width:"100%",padding:"10px 12px",border:"none",borderRadius:8,background:t.accent,color:"#000",cursor:"pointer",...f(600,12),marginBottom:8}}>
              Listen on Spotify
            </button>
            <button style={{width:"100%",padding:"10px 12px",border:"none",borderRadius:8,background:`linear-gradient(135deg, #FF1D8A, #FF0000)`,color:"#FFF",cursor:"pointer",...f(600,12)}}>
              Listen on Apple Music
            </button>
          </div>
        </div>

        <div style={{padding:"0 20px"}}>
          <div style={{background:t.surface,border:`1px solid ${t.divider}`,borderRadius:12,padding:12,textAlign:"center"}}>
            <div style={{...f(600,12),color:t.text,marginBottom:4}}>24</div>
            <div style={{...f(400,11),color:t.textSecondary}}>puzzles completed</div>
          </div>
        </div>
      </div>
      <BottomNav />
    </div>
  );

  if (screen === SCREENS.CROSSWORDS) return <CrosswordScreen goBack={goBack} genre={genre} difficulty={difficulty} darkMode={darkMode} cwCells={cwCells} setCwCells={setCwCells} cwActive={cwActive} setCwActive={setCwActive} cwDir={cwDir} setCwDir={setCwDir} cwRevealed={cwRevealed} setCwRevealed={setCwRevealed} cwDropdownOpen={cwDropdownOpen} setCwDropdownOpen={setCwDropdownOpen} cwTimerSec={cwTimerSec} timerRunning={timerRunning} setTimerRunning={setTimerRunning} colorOverride={colorOverride} cwTriviaIdx={cwTriviaIdx} setCwTriviaIdx={setCwTriviaIdx} />;

  if (screen === SCREENS.SOLO) return <SoloScreen goBack={goBack} genre={genre} difficulty={difficulty} darkMode={darkMode} soloGuesses={soloGuesses} setSoloGuesses={setSoloGuesses} soloCurrent={soloCurrent} setSoloCurrent={setSoloCurrent} soloGameOver={soloGameOver} setSoloGameOver={setSoloGameOver} soloTimerSec={soloTimerSec} timerRunning={timerRunning} setTimerRunning={setTimerRunning} colorOverride={colorOverride} soloTriviaIdx={soloTriviaIdx} setSoloTriviaIdx={setSoloTriviaIdx} />;

  if (screen === SCREENS.MINI) return <MiniScreen goBack={goBack} genre={genre} difficulty={difficulty} darkMode={darkMode} miniCells={miniCells} setMiniCells={setMiniCells} miniActive={miniActive} setMiniActive={setMiniActive} miniDir={miniDir} setMiniDir={setMiniDir} miniDropdownOpen={miniDropdownOpen} setMiniDropdownOpen={setMiniDropdownOpen} miniTimerSec={miniTimerSec} timerRunning={timerRunning} setTimerRunning={setTimerRunning} colorOverride={colorOverride} miniTriviaIdx={miniTriviaIdx} setMiniTriviaIdx={setMiniTriviaIdx} />;

  if (screen === SCREENS.GROOVE) return <GrooveScreen goBack={goBack} genre={genre} difficulty={difficulty} darkMode={darkMode} grooveSelected={grooveSelected} setGrooveSelected={setGrooveSelected} grooveFound={grooveFound} setGrooveFound={setGrooveFound} grooveWrong={grooveWrong} setGrooveWrong={setGrooveWrong} grooveTimerSec={grooveTimerSec} timerRunning={timerRunning} setTimerRunning={setTimerRunning} colorOverride={colorOverride} grooveTriviaIdx={grooveTriviaIdx} setGrooveTriviaIdx={setGrooveTriviaIdx} />;

  if (screen === SCREENS.STATS) return <StatsScreen goBack={goBack} statsTab={statsTab} setStatsTab={setStatsTab} genre={genre} difficulty={difficulty} darkMode={darkMode} colorOverride={colorOverride} />;

  if (screen === SCREENS.ARCHIVE) return <ArchiveScreen goBack={goBack} genre={genre} difficulty={difficulty} darkMode={darkMode} colorOverride={colorOverride} />;

  if (screen === SCREENS.PROFILE) return <ProfileScreen goBack={goBack} genre={genre} difficulty={difficulty} darkMode={darkMode} colorOverride={colorOverride} />;

  // ── Reusable Components ──

  function GameHeader({title}) {
    const baseTheme = GENRE_THEMES[genre][darkMode ? "dark" : "light"];
    let th = {...baseTheme};
    if (colorOverride && colorOverride !== "Default") {
      const overrideColor = COLOR_PALETTES[colorOverride];
      if (overrideColor) th.accent = overrideColor;
    }
    return (
      <>
        <div style={{display:"flex",alignItems:"center",padding:"14px 20px 0",gap:8}}>
          <button onClick={goBack} style={{background:"none",border:"none",padding:4,display:"flex",cursor:"pointer"}}>
            <I.Chev c={th.accent} s={22} dir="left"/>
          </button>
          {title && <span style={{...f(600,16),color:th.text}}>{title}</span>}
        </div>
        <div style={{display:"flex",gap:8,padding:"12px 20px 0",flexWrap:"wrap"}}>
          <div style={{padding:"6px 12px",borderRadius:6,background:th.accentSoft,border:`1px solid ${th.accentBorder}`,color:th.text,...f(500,11)}}>
            {genre}
          </div>
          <div style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${th.accentBorder}`,color:th.text,...f(500,11)}}>
            {difficulty}
          </div>
        </div>
      </>
    );
  }

  function TriviaBox({gameType, triviaIdx, setTriviaIdx}) {
    const baseTheme = GENRE_THEMES[genre][darkMode ? "dark" : "light"];
    let th = {...baseTheme};
    if (colorOverride && colorOverride !== "Default") {
      const overrideColor = COLOR_PALETTES[colorOverride];
      if (overrideColor) th.accent = overrideColor;
    }
    const facts = TRIVIA[genre][gameType] || [];
    const currentFact = facts[triviaIdx % facts.length];
    return (
      <div style={{background:th.surface,border:`1px solid ${th.divider}`,borderRadius:12,padding:12,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1}}>
            <div style={{...f(500,11),color:th.muted,marginBottom:4}}>Did You Know?</div>
            <div style={{...f(400,12),color:th.text}}>{currentFact}</div>
          </div>
          <button onClick={() => setTriviaIdx(i => i + 1)} style={{background:"none",border:"none",padding:4,cursor:"pointer",display:"flex",minWidth:24,justifyContent:"center"}}>
            <I.Refresh c={th.accent} s={16} />
          </button>
        </div>
      </div>
    );
  }

  function DropdownMenu({open, setOpen, items, position="left"}) {
    const baseTheme = GENRE_THEMES[genre][darkMode ? "dark" : "light"];
    let th = {...baseTheme};
    if (colorOverride && colorOverride !== "Default") {
      const overrideColor = COLOR_PALETTES[colorOverride];
      if (overrideColor) th.accent = overrideColor;
    }
    if (!open) return null;
    return (
      <div style={{position:"absolute",top:"100%",left:position==="left"?0:"auto",right:position==="right"?0:"auto",marginTop:4,background:th.surface,border:`1px solid ${th.divider}`,borderRadius:8,zIndex:200,minWidth:140,boxShadow:th.cardShadow}}>
        {items.map((item, idx) => (
          <button key={idx} onClick={() => {item.action();setOpen(false);}} style={{
            display:"block",width:"100%",padding:"10px 12px",textAlign:"left",border:"none",background:"transparent",color:th.text,cursor:"pointer",borderRadius:0,fontSize:13,fontWeight:400,transition:"background 0.2s",borderBottom:idx<items.length-1?`1px solid ${th.divider}`:"none"
          }} onMouseEnter={e => e.target.style.background = th.surfaceHover} onMouseLeave={e => e.target.style.background = "transparent"}>
            {item.label}
          </button>
        ))}
      </div>
    );
  }

  function Shell({children,title,showBack=true}) {
    const baseTheme = GENRE_THEMES[genre][darkMode ? "dark" : "light"];
    let th = {...baseTheme};
    if (colorOverride && colorOverride !== "Default") {
      const overrideColor = COLOR_PALETTES[colorOverride];
      if (overrideColor) th.accent = overrideColor;
    }
    return (
      <div style={{minHeight:"100vh",background:th.bg,transition:"background 0.35s ease",...f()}}>
        <div style={{maxWidth:420,margin:"0 auto",paddingBottom:70}}>
          {showBack && (
            <div style={{display:"flex",alignItems:"center",padding:"14px 20px 0",gap:8}}>
              <button onClick={goBack} style={{background:"none",border:"none",padding:4,display:"flex",cursor:"pointer"}}><I.Chev c={th.accent} s={22} dir="left"/></button>
              {title && <span style={{...f(600,16),color:th.text}}>{title}</span>}
            </div>
          )}
          {children}
        </div>
        <BottomNav />
      </div>
    );
  }

  function BottomNav() {
    const baseTheme = GENRE_THEMES[genre][darkMode ? "dark" : "light"];
    let tn = {...baseTheme};
    if (colorOverride && colorOverride !== "Default") {
      const overrideColor = COLOR_PALETTES[colorOverride];
      if (overrideColor) tn.accent = overrideColor;
    }
    return (
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:tn.navBg,borderTop:`1px solid ${tn.navBorder}`,display:"flex",justifyContent:"center",zIndex:100}}>
        <div style={{display:"flex",maxWidth:420,width:"100%",justifyContent:"space-around",padding:"8px 0 12px"}}>
          {[
            {icon:I.Home,label:"Home",scr:SCREENS.HOME},
            {icon:I.Cross,label:"Crosswords",scr:SCREENS.CROSSWORDS},
            {icon:I.Grid,label:"Solo",scr:SCREENS.SOLO},
            {icon:I.Tile,label:"Mini",scr:SCREENS.MINI},
            {icon:I.Wave,label:"Groove",scr:SCREENS.GROOVE},
          ].map(item => {
            const active = screen === item.scr;
            return (
              <button key={item.label} onClick={() => {
                if (item.scr === SCREENS.HOME) {
                  setHistory([]);
                  setScreen(item.scr);
                  setTimerRunning(false);
                  setActiveGame(null);
                } else {
                  startGame(item.scr);
                }
              }} style={{
                background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 12px",cursor:"pointer"
              }}>
                <item.icon c={active ? tn.accent : tn.muted} s={20} />
                <span style={{...f(active?600:400,9),color:active?tn.accent:tn.muted}}>{item.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  function CrosswordScreen({goBack,genre,difficulty,darkMode,cwCells,setCwCells,cwActive,setCwActive,cwDir,setCwDir,cwRevealed,setCwRevealed,cwDropdownOpen,setCwDropdownOpen,cwTimerSec,timerRunning,setTimerRunning,colorOverride,cwTriviaIdx,setCwTriviaIdx}) {
    const baseTheme = GENRE_THEMES[genre][darkMode ? "dark" : "light"];
    let ts = {...baseTheme};
    if (colorOverride && colorOverride !== "Default") {
      const overrideColor = COLOR_PALETTES[colorOverride];
      if (overrideColor) ts.accent = overrideColor;
    }
    return (
      <Shell title="Crosswords" showBack={true}>
        <GameHeader title="Crosswords" />
        <TriviaBox gameType="crosswords" triviaIdx={cwTriviaIdx} setTriviaIdx={setCwTriviaIdx} />
        <div style={{padding:"0 20px",marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:20}}>
            {CW_GRID.map((row,r) => row.map((cell,c) => (

  function ArchiveScreen({goBack,genre,difficulty,darkMode,colorOverride}) {
    const baseTheme = GENRE_THEMES[genre][darkMode ? "dark" : "light"];
    let ts = {...baseTheme};
    if (colorOverride && colorOverride !== "Default") {
      const overrideColor = COLOR_PALETTES[colorOverride];
      if (overrideColor) ts.accent = overrideColor;
    }
    const days = 28;
    const completed = 12;
    const inProgress = 8;
    const percentComplete = Math.round((completed / days) * 100);

    return (
      <Shell title="Archive">
        <div style={{padding:"20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <div style={{...f(600,14),color:ts.text}}>April 2026</div>
            <div style={{...f(500,12),color:ts.muted}}>{percentComplete}% complete</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
            {Array.from({length:days}).map((_, idx) => {
              const isCompleted = idx < completed;
              const isInProgress = idx >= completed && idx < completed + inProgress;
              let statusIcon = null;
              if (isCompleted) statusIcon = <I.Check c={ts.green} s={14} />;
              else if (isInProgress) statusIcon = <div style={{width:8,height:8,borderRadius:"50%",background:ts.amber}}></div>;

              return (
                <div key={idx} style={{
                  aspectRatio:"1",background:ts.surface,border:`1px solid ${ts.divider}`,borderRadius:8,
                  display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:4,cursor:"pointer"
                }}>
                  <div style={{...f(500,11),color:ts.text}}>{idx+1}</div>
                  {statusIcon && <div>{statusIcon}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </Shell>
    );
  }
