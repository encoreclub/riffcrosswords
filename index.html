// Day rotation: pick puzzle based on current date
function getDayPuzzle(genreData, gameType) {
  const days = genreData[gameType + "Days"];
  if (!days || days.length === 0) return genreData[gameType];
  const today = new Date();
  const dayIndex = Math.floor((today.getTime() / 86400000)) % days.length;
  return days[dayIndex];
}

  // Apply color override

  const today = new Date();

    <div style={{background:t.navBg,borderTop:`1px solid ${t.navBorder}`,display:"flex",justifyContent:"center"}}>

  // ── Trivia Box ──

  // ═══════ CROSSWORD LOGIC ═══════
  const handleCwKey = useCallback((e) => {
    if (screen !== SCREENS.CROSSWORDS) return;
    const [r,c] = cwActive;
    const key = e.key.toUpperCase();
    if (key === "BACKSPACE") {
      setCwCells(prev => {const n=[...prev.map(r=>[...r])];n[r][c]="";return n;});
      // Move back
      if (cwDir==="across" && c > 0) setCwActive([r,c-1]);
      if (cwDir==="down" && r > 0) setCwActive([r-1,c]);
    } else if (key === "TAB") {
      e.preventDefault();
      setCwDir(d => d === "across" ? "down" : "across");
    } else if (/^[A-Z]$/.test(key)) {
      setCwCells(prev => {const n=[...prev.map(r=>[...r])];n[r][c]=key;return n;});
      // Advance
      if (cwDir==="across" && c < 6) setCwActive([r,c+1]);
      if (cwDir==="down" && r < 6) setCwActive([r+1,c]);
    } else if (key === "ARROWLEFT") setCwActive([r,Math.max(0,c-1)]);
    else if (key === "ARROWRIGHT") setCwActive([r,Math.min(6,c+1)]);
    else if (key === "ARROWUP") setCwActive([Math.max(0,r-1),c]);
    else if (key === "ARROWDOWN") setCwActive([Math.min(6,r+1),c]);
  }, [screen, cwActive, cwDir]);

  useEffect(() => {
    window.addEventListener("keydown", handleCwKey);
    return () => window.removeEventListener("keydown", handleCwKey);
  }, [handleCwKey]);

  // Get cells belonging to the current word (based on active cell + direction)
  const getCwWordCells = (grid, ar, ac, dir) => {
    const cells = [];
    if (dir === "across") {
      let c = ac; while (c > 0 && grid[ar][c-1] !== "#") c--;
      while (c < grid[0].length && grid[ar][c] !== "#") { cells.push([ar,c]); c++; }
    } else {
      let r = ar; while (r > 0 && grid[r-1][ac] !== "#") r--;
      while (r < grid.length && grid[r][ac] !== "#") { cells.push([r,ac]); r++; }
    }
    return cells;
  };

  // CHECK
  const cwCheckLetter = () => {
    const [r,c] = cwActive; const v = cwCells[r]?.[c];
    if (v && v !== "#" && v !== "") setCwChecked(p => ({...p, [`${r}_${c}`]: v === CW_GRID[r][c] ? "correct" : "wrong"}));
    setCwActionMenu(null);
  };
  const cwCheckWord = () => {
    const wc = getCwWordCells(CW_GRID, cwActive[0], cwActive[1], cwDir);
    const upd = {};
    wc.forEach(([r,c]) => { const v = cwCells[r][c]; if (v && v !== "#" && v !== "") upd[`${r}_${c}`] = v === CW_GRID[r][c] ? "correct" : "wrong"; });
    setCwChecked(p => ({...p, ...upd}));
    setCwActionMenu(null);
  };
  const cwCheckPuzzle = () => {
    const upd = {};
    cwCells.forEach((row,ri) => row.forEach((v,ci) => { if (v && v !== "#" && v !== "") upd[`${ri}_${ci}`] = v === CW_GRID[ri][ci] ? "correct" : "wrong"; }));
    setCwChecked(p => ({...p, ...upd}));
    setCwActionMenu(null);
  };

  // REVEAL
  const cwRevealLetter = () => {
    const [r,c] = cwActive;
    if (CW_GRID[r][c] !== "#") setCwCells(p => { const n = p.map(r=>[...r]); n[r][c] = CW_GRID[r][c]; return n; });
    setCwChecked(p => { const n = {...p}; delete n[`${r}_${c}`]; return n; });
    setCwActionMenu(null);
  };
  const cwRevealWord = () => {
    const wc = getCwWordCells(CW_GRID, cwActive[0], cwActive[1], cwDir);
    setCwCells(p => { const n = p.map(r=>[...r]); wc.forEach(([r,c]) => n[r][c] = CW_GRID[r][c]); return n; });
    setCwChecked(p => { const n = {...p}; wc.forEach(([r,c]) => delete n[`${r}_${c}`]); return n; });
    setCwActionMenu(null);
  };
  const cwRevealPuzzle = () => {
    setCwCells(CW_GRID.map(r => [...r]));
    setCwRevealed(true); setCwChecked({}); setTimerRunning(false);
    setCwActionMenu(null);
  };

  // CLEAR
  const cwClearLetter = () => {
    const [r,c] = cwActive;
    if (CW_GRID[r][c] !== "#") setCwCells(p => { const n = p.map(r=>[...r]); n[r][c] = ""; return n; });
    setCwChecked(p => { const n = {...p}; delete n[`${r}_${c}`]; return n; });
    setCwActionMenu(null);
  };
  const cwClearWord = () => {
    const wc = getCwWordCells(CW_GRID, cwActive[0], cwActive[1], cwDir);
    setCwCells(p => { const n = p.map(r=>[...r]); wc.forEach(([r,c]) => n[r][c] = ""); return n; });
    setCwChecked(p => { const n = {...p}; wc.forEach(([r,c]) => delete n[`${r}_${c}`]); return n; });
    setCwActionMenu(null);
  };
  const cwClearPuzzle = () => {
    setCwCells(CW_GRID.map(r => r.map(c => c === "#" ? "#" : "")));
    setCwRevealed(false); setCwChecked({});
    setCwActionMenu(null);
  };

  // ═══════ SOLO LOGIC ═══════
  const handleSoloKey = useCallback((letter) => {
    if (soloGameOver) return;
    if (letter === "Del") {
      setSoloCurrent(c => c.slice(0,-1));
    } else if (letter === "Enter") {
      if (soloCurrent.length === 5) {
        const guess = soloCurrent.toUpperCase();
        const result = guess.split("").map((ch,i) => {
          if (ch === SOLO_WORD[i]) return "correct";
          if (SOLO_WORD.includes(ch)) return "present";
          return "absent";
        });
        setSoloGuesses(prev => [...prev, {letters: guess.split(""), colors: result}]);
        setSoloCurrent("");
        if (guess === SOLO_WORD || soloGuesses.length >= 5) {
          setSoloGameOver(true);
          setTimerRunning(false);
        }
      }
    } else if (soloCurrent.length < 5) {
      setSoloCurrent(c => c + letter.toUpperCase());
    }
  }, [soloCurrent, soloGuesses, soloGameOver]);

  useEffect(() => {
    const handler = (e) => {
      if (screen !== SCREENS.SOLO) return;
      const k = e.key;
      if (k === "Backspace") handleSoloKey("Del");
      else if (k === "Enter") handleSoloKey("Enter");
      else if (/^[a-zA-Z]$/.test(k)) handleSoloKey(k.toUpperCase());

    return () => window.removeEventListener("keydown", handler);
  }, [screen, handleSoloKey]);

  const soloKeyColors = {};
  soloGuesses.forEach(g => {
    g.letters.forEach((l,i) => {
      const c = g.colors[i];
      if (c === "correct") soloKeyColors[l] = "correct";
      else if (c === "present" && soloKeyColors[l] !== "correct") soloKeyColors[l] = "present";
      else if (!soloKeyColors[l]) soloKeyColors[l] = "absent";
    });
  });

  // ═══════ GROOVE LOGIC ═══════
  const handleGrooveCell = (idx) => {
    if (grooveSelected.includes(idx)) {
      setGrooveSelected(s => s.filter(i => i !== idx));
    } else {
      setGrooveSelected(s => [...s, idx]);

    setGrooveWrong(false);
  };
  const handleGrooveSubmit = () => {
    const selectedWord = grooveSelected.map(i => GROOVE_LETTERS[i]).join("");
    const match = GROOVE_WORDS.find(w => w === selectedWord);
    if (match && !grooveFound.includes(match)) {
      setGrooveFound(f => [...f, match]);
      setGrooveSelected([]);
      if (grooveFound.length + 1 === GROOVE_WORDS.length) setTimerRunning(false);
    } else {
      setGrooveWrong(true);
      setTimeout(() => { setGrooveSelected([]); setGrooveWrong(false); }, 600);
    }
  };

  // ═══════ MINI LOGIC ═══════
  const handleMiniKey = useCallback((e) => {
    if (screen !== SCREENS.MINI) return;

    const key = e.key.toUpperCase();
    if (key === "BACKSPACE") {
      setMiniCells(prev => {const n=prev.map(r=>[...r]);n[r][c]="";return n;});
      if (miniDir==="across" && c > 0) setMiniActive([r,c-1]);

      setMiniDir(d => d === "across" ? "down" : "across");
    } else if (/^[A-Z]$/.test(key)) {
      setMiniCells(prev => {const n=prev.map(r=>[...r]);n[r][c]=key;return n;});
      if (miniDir==="across" && c < 4) setMiniActive([r,c+1]);
      if (miniDir==="down" && r < 4) setMiniActive([r+1,c]);
    } else if (key === "ARROWLEFT") setMiniActive([r,Math.max(0,c-1)]);
    else if (key === "ARROWRIGHT") setMiniActive([r,Math.min(4,c+1)]);
    else if (key === "ARROWUP") setMiniActive([Math.max(0,r-1),c]);
    else if (key === "ARROWDOWN") setMiniActive([Math.min(4,r+1),c]);

  // ═══════ HOME ═══════

          </div>

        <div style={{padding:"0 20px"}}>
          <div onClick={() => navigate(SCREENS.ARCHIVE)} style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",boxShadow:t.cardShadow}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <I.Cal c={t.accent} s={18}/><span style={{...f(500,14),color:t.text}}>Back Catalog</span>
            </div>

          </div>
        </div>

          <button onClick={() => setDarkMode(!darkMode)} style={{
            background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:"9px 22px",
            display:"flex",alignItems:"center",gap:8,boxShadow:t.cardShadow,...f(400,12),color:t.textSecondary,
          }}>
            {darkMode ? <I.Sun c={t.accent} s={15}/> : <I.Moon c={t.accent} s={15}/>}
            {darkMode ? "Light mode" : "Dark mode"}

        <footer style={{display:"flex",justifyContent:"center",gap:20,padding:"28px 20px 16px"}}>

        </footer>
      </div>
    </div>
  );

  // ═══════ CROSSWORDS ═══════
  if (screen === SCREENS.CROSSWORDS) {
    const getNum = (r,c) => CW_NUMS[r] && CW_NUMS[r][c];
    return (
      <Shell title="Crosswords">
        <div style={{textAlign:"center",padding:"12px 20px 4px"}}><span style={{...f(400,11),color:t.muted}}>Puzzle #42 — {dateStr} — {genre} — {difficulty}</span></div>
        <div style={{textAlign:"center",padding:"4px 20px 8px"}}><span style={{...f(300,26),color:t.textSecondary,letterSpacing:"0.08em"}}>{fmtTime(timerSec)}</span></div>
        <div style={{padding:"0 20px 8px"}}>
          <div style={{display:"flex",justifyContent:"center",gap:8}}>
            {["Check","Reveal","Clear"].map(action => (
              <button key={action} onClick={() => setCwActionMenu(m => m === action.toLowerCase() ? null : action.toLowerCase())}
                style={{background:cwActionMenu===action.toLowerCase()?t.accentSoft:"none",border:`1px solid ${cwActionMenu===action.toLowerCase()?t.accent:t.divider}`,borderRadius:8,padding:"5px 14px",...f(500,11),color:t.accent}}>
                {action}
              </button>
            ))}
          </div>
          {cwActionMenu && (
            <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:6}}>
              {[
                {l:"Letter",fn:{check:cwCheckLetter,reveal:cwRevealLetter,clear:cwClearLetter}[cwActionMenu]},
                {l:"Word",fn:{check:cwCheckWord,reveal:cwRevealWord,clear:cwClearWord}[cwActionMenu]},
                {l:"Puzzle",fn:{check:cwCheckPuzzle,reveal:cwRevealPuzzle,clear:cwClearPuzzle}[cwActionMenu]},
              ].map(b => (
                <button key={b.l} onClick={b.fn} style={{background:t.gradientBtn,border:"none",borderRadius:6,padding:"4px 12px",...f(500,10),color:t.pillText}}>{b.l}</button>
              ))}
            </div>
          )}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"0 12px"}} tabIndex={0}>
          {CW_GRID.map((row,ri) => (
            <div key={ri} style={{display:"flex",gap:1}}>
              {row.map((ans,ci) => {
                const black = ans === "#";
                const active = cwActive[0]===ri && cwActive[1]===ci;
                const hlRow = cwDir==="across" && cwActive[0]===ri && !black;
                const hlCol = cwDir==="down" && cwActive[1]===ci && !black;
                const userVal = cwCells[ri][ci];
                const checkState = cwChecked[`${ri}_${ci}`]; // "correct"|"wrong"|undefined
                const correct = userVal !== "" && userVal !== "#" && userVal === CW_GRID[ri][ci];
                const wrong = checkState === "wrong";
                const num = getNum(ri,ci);
                return (
                  <div key={ci} onClick={() => {if(!black){if(cwActive[0]===ri&&cwActive[1]===ci)setCwDir(d=>d==="across"?"down":"across");setCwActive([ri,ci]);}}}
                    style={{
                      width:44,height:44,borderRadius:3,position:"relative",cursor:black?"default":"pointer",
                      background:black?(darkMode?"#222":"#CCC"):active?t.accent:checkState==="correct"?t.greenSoft:checkState==="wrong"?"rgba(239,68,68,0.1)":(hlRow||hlCol)?t.accentSoft:t.cardBg,
                      border:`1px solid ${black?"transparent":active?t.accent:checkState==="correct"?t.green:checkState==="wrong"?"#EF4444":t.cardBorder}`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      ...f(600,16),color:active?t.pillText:checkState==="wrong"?"#EF4444":checkState==="correct"?t.green:t.text,
                    }}>
                    {num && <span style={{position:"absolute",top:2,left:3,...f(400,8),color:active?t.pillText+"B3":t.muted}}>{num}</span>}
                    {!black && (userVal !== "#" ? userVal : "")}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <div style={{padding:"12px 20px 0"}}>
          <div style={{...f(600,11),color:t.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Across</div>
          {CW_CLUES.across.map((c,i) => <ClueRow key={`a${i}`} clue={c.clue} hint={c.hint}/>)}
          <div style={{...f(600,11),color:t.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:16,marginBottom:8}}>Down</div>
          {CW_CLUES.down.map((c,i) => <ClueRow key={`d${i}`} clue={c.clue} hint={c.hint}/>)}
        </div>
        <TriviaBox gameKey="crosswords"/>
        <SpotifyInvite/>
      </Shell>
    );
  }

  // ═══════ SOLO ═══════
  if (screen === SCREENS.SOLO) {
    const allRows = [...soloGuesses];
    while (allRows.length < 6) allRows.push(null);
    const cMap = {correct:t.green,present:t.amber,absent:darkMode?"#444":"#D0D0D0",empty:"transparent"};
    const bMap = {correct:t.green,present:t.amber,absent:darkMode?"#444":"#D0D0D0",empty:darkMode?"#333":"#D0D0D0"};
    const keyboard = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["Enter","Z","X","C","V","B","N","M","Del"]];
    return (
      <Shell title="Solo">
        <div style={{textAlign:"center",padding:"12px 20px 4px"}}><span style={{...f(400,11),color:t.muted}}>Puzzle #42 — {dateStr} — {genre} — {difficulty}</span></div>
        <div style={{textAlign:"center",padding:"4px 20px 8px"}}><span style={{...f(300,26),color:t.textSecondary,letterSpacing:"0.08em"}}>{fmtTime(timerSec)}</span></div>
        <div style={{textAlign:"center",padding:"0 20px 12px"}}><span style={{...f(400,12),color:t.accent,fontStyle:"italic"}}>{PZ.solo.hint}</span></div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"0 20px"}}>
          {allRows.map((row,ri) => {
            const isCurrent = ri === soloGuesses.length && !soloGameOver;
            return (
              <div key={ri} style={{display:"flex",gap:6}}>
                {[0,1,2,3,4].map(ci => {
                  let letter = "", color = "empty";
                  if (row) { letter = row.letters[ci]; color = row.colors[ci]; }
                  else if (isCurrent && ci < soloCurrent.length) { letter = soloCurrent[ci]; }
                  return (
                    <div key={ci} style={{
                      width:54,height:54,borderRadius:8,
                      background:cMap[color],border:`2px solid ${bMap[color]}`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      ...f(700,22),color:color==="empty"?t.text:"#FFF",
                      transform: isCurrent && ci === soloCurrent.length - 1 ? "scale(1.05)" : "scale(1)",
                      transition: "transform 0.1s",
                    }}>{letter}</div>
                  );
                })}
              </div>
            );
          })}
        </div>
        {soloGameOver && (
          <div style={{textAlign:"center",padding:"12px 20px"}}>
            <span style={{...f(600,16),color:soloGuesses[soloGuesses.length-1]?.letters.join("")===SOLO_WORD?t.green:"#EF4444"}}>
              {soloGuesses[soloGuesses.length-1]?.letters.join("")===SOLO_WORD ? `Solved in ${soloGuesses.length}/6!` : `The word was ${SOLO_WORD}`}
            </span>
          </div>
        )}
        <div style={{padding:"20px 8px 12px",display:"flex",flexDirection:"column",gap:5,alignItems:"center"}}>
          {keyboard.map((row,ri) => (
            <div key={ri} style={{display:"flex",gap:4}}>
              {row.map(key => {
                const wide = key==="Enter"||key==="Del";
                const kc = soloKeyColors[key];
                return (
                  <button key={key} onClick={() => handleSoloKey(key)} style={{
                    width:wide?56:34,height:44,borderRadius:6,
                    background:kc?(kc==="correct"?t.green:kc==="present"?t.amber:(darkMode?"#333":"#D0D0D0")):(darkMode?"#2A2A2A":"#E5E5E5"),
                    border:"none",...f(600,wide?10:14),color:kc?"#FFF":t.text,
                    display:"flex",alignItems:"center",justifyContent:"center",
                  }}>{key}</button>
                );
              })}
            </div>
          ))}
        </div>
        <TriviaBox gameKey="solo"/>
        <SpotifyInvite/>
      </Shell>
    );
  }

  // ═══════ MINI ═══════
  if (screen === SCREENS.MINI) {
    return (
      <Shell title="Mini">
        <div style={{textAlign:"center",padding:"12px 20px 4px"}}><span style={{...f(400,11),color:t.muted}}>Puzzle #42 — {dateStr} — {genre} — {difficulty}</span></div>
        <div style={{textAlign:"center",padding:"4px 20px 12px"}}><span style={{...f(300,26),color:t.textSecondary,letterSpacing:"0.08em"}}>{fmtTime(timerSec)}</span></div>
        <div style={{display:"flex",justifyContent:"center",gap:12,padding:"0 20px 12px"}}>
          {[{l:"Reveal",fn:()=>{setMiniCells(MINI_GRID.map(r=>[...r]));setTimerRunning(false);}},{l:"Clear",fn:()=>setMiniCells(MINI_GRID.map(r=>r.map(c=>c==="#"?"#":"")))}].map(b => (
            <button key={b.l} onClick={b.fn} style={{background:"none",border:`1px solid ${t.divider}`,borderRadius:8,padding:"5px 14px",...f(500,11),color:t.accent}}>{b.l}</button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"0 20px"}} tabIndex={0}>
          {MINI_GRID.map((row,ri) => (
            <div key={ri} style={{display:"flex",gap:1}}>
              {row.map((ans,ci) => {
                const black = ans === "#";
                const active = miniActive[0]===ri && miniActive[1]===ci;
                const hlRow = miniDir==="across" && miniActive[0]===ri && !black;
                const hlCol = miniDir==="down" && miniActive[1]===ci && !black;
                const num = MINI_NUMS[ri] && MINI_NUMS[ri][ci];
                return (
                  <div key={ci} onClick={() => {if(!black){if(miniActive[0]===ri&&miniActive[1]===ci)setMiniDir(d=>d==="across"?"down":"across");setMiniActive([ri,ci]);}}}
                    style={{
                      width:56,height:56,borderRadius:4,position:"relative",cursor:black?"default":"pointer",
                      background:black?(darkMode?"#222":"#CCC"):active?t.accent:(hlRow||hlCol)?t.accentSoft:t.cardBg,
                      border:`1px solid ${black?"transparent":active?t.accent:t.cardBorder}`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      ...f(600,20),color:active?t.pillText:t.text,
                    }}>
                    {num && <span style={{position:"absolute",top:2,left:4,...f(400,8),color:active?t.pillText+"B3":t.muted}}>{num}</span>}
                    {!black && miniCells[ri][ci]}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <div style={{padding:"12px 20px 0"}}>
          <div style={{...f(600,11),color:t.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Across</div>
          {MINI_CLUES.across.map((c,i) => <ClueRow key={`a${i}`} clue={c.clue} hint={c.hint}/>)}
          <div style={{...f(600,11),color:t.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:16,marginBottom:8}}>Down</div>
          {MINI_CLUES.down.map((c,i) => <ClueRow key={`d${i}`} clue={c.clue} hint={c.hint}/>)}
        </div>
        <TriviaBox gameKey="mini"/>
        <SpotifyInvite/>
      </Shell>
    );
  }

  // ═══════ GROOVE ═══════
  if (screen === SCREENS.GROOVE) {
    const SIZE = 8;
    return (
      <Shell title="Groove">
        <div style={{textAlign:"center",padding:"12px 20px 0"}}><span style={{...f(600,13),color:t.accent}}>{PZ.groove.theme}</span></div>
        <div style={{textAlign:"center",padding:"4px 20px 4px"}}><span style={{...f(400,11),color:t.muted}}>Find {GROOVE_WORDS.length} words — Puzzle #42 — {genre} — {difficulty}</span></div>
        <div style={{textAlign:"center",padding:"4px 20px 12px"}}><span style={{...f(300,26),color:t.textSecondary,letterSpacing:"0.08em"}}>{fmtTime(timerSec)}</span></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",padding:"0 20px 10px"}}>
          {GROOVE_WORDS.map((w,i) => {
            const found = grooveFound.includes(w);
            return <span key={i} style={{padding:"4px 10px",borderRadius:6,background:found?t.greenSoft:t.surfaceHover,border:`1px solid ${found?t.green:t.cardBorder}`,...f(600,11),color:found?t.green:t.muted,letterSpacing:found?0:"0.15em"}}>{found ? w : w.replace(/./g,"_")}</span>;
          })}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"0 12px"}}>
          {Array.from({length:SIZE},(_,ri) => (
            <div key={ri} style={{display:"flex",gap:2}}>
              {Array.from({length:SIZE},(_,ci) => {
                const idx = ri*SIZE+ci;
                const sel = grooveSelected.includes(idx);
                const isFoundLetter = grooveFound.some(w => {
                  const start = GROOVE_LETTERS.join("").indexOf(w);
                  if (start === -1) return false;
                  for (let k=0;k<w.length;k++) if (start+k===idx) return true;
                  return false;
                });
                return (
                  <div key={ci} onClick={() => handleGrooveCell(idx)} style={{
                    width:40,height:40,borderRadius:6,cursor:"pointer",
                    background:isFoundLetter?t.greenSoft:sel?(grooveWrong?"rgba(239,68,68,0.2)":t.accentSoft):t.cardBg,
                    border:`1px solid ${isFoundLetter?t.green:sel?(grooveWrong?"#EF4444":t.accent):t.cardBorder}`,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    ...f(600,14),color:isFoundLetter?t.green:sel?t.accent:t.text,
                    transition:"all 0.15s",
                  }}>{GROOVE_LETTERS[idx]}</div>
                );
              })}
            </div>
          ))}
        </div>
        {grooveSelected.length > 0 && (
          <div style={{display:"flex",justifyContent:"center",padding:"12px 20px",gap:10}}>
            <span style={{...f(600,14),color:t.accent}}>{grooveSelected.map(i=>GROOVE_LETTERS[i]).join("")}</span>
            <button onClick={handleGrooveSubmit} style={{background:t.gradientBtn,border:"none",borderRadius:8,padding:"6px 20px",...f(600,12),color:t.pillText}}>Submit</button>
            <button onClick={() => setGrooveSelected([])} style={{background:"none",border:`1px solid ${t.divider}`,borderRadius:8,padding:"6px 14px",...f(400,12),color:t.muted}}>Clear</button>
          </div>
        )}
        <div style={{padding:"8px 20px",textAlign:"center"}}><span style={{...f(400,11),color:t.muted}}>Tap letters to select, then Submit. {grooveFound.length}/{GROOVE_WORDS.length} found.</span></div>
        <TriviaBox gameKey="groove"/>
        <SpotifyInvite/>
      </Shell>
    );
  }

  // ═══════ STATS ═══════
  if (screen === SCREENS.STATS) {
    const overallStats = {played:87,winRate:94,streak:12,bestStreak:23,avgTime:"3:42"};
    const gameStats = {
      Crosswords:{played:32,winRate:97,avgTime:"12:18",bestTime:"8:45",streak:8},
      Solo:{played:24,winRate:88,avgTime:"2:36",bestTime:"1:12",streak:5},
      Mini:{played:18,winRate:100,avgTime:"1:24",bestTime:"0:38",streak:18},
      Groove:{played:13,winRate:92,avgTime:"4:15",bestTime:"2:50",streak:4},
    };
    const genreBreakdown = {Jazz:{played:42,winRate:95},Rock:{played:28,winRate:93},"Pop":{played:17,winRate:94}};
    const dist = [{g:1,n:1},{g:2,n:4},{g:3,n:7},{g:4,n:6},{g:5,n:4},{g:6,n:2}];
    const mx = Math.max(...dist.map(d=>d.n));
    return (
      <Shell title="Stats">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"16px 20px 0"}}>
          {[{l:"Played",v:overallStats.played,c:t.accent},{l:"Win %",v:overallStats.winRate,c:t.green},{l:"Streak",v:overallStats.streak,c:t.amber}].map(s => (
            <div key={s.l} style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"14px 8px",textAlign:"center",boxShadow:t.cardShadow}}>
              <div style={{...f(700,26),color:s.c,lineHeight:1.1}}>{s.v}</div>
              <div style={{...f(400,10),color:t.muted,textTransform:"uppercase",marginTop:4}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,padding:"8px 20px 0"}}>
          <div style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"12px 14px",boxShadow:t.cardShadow,display:"flex",alignItems:"center",gap:10}}>
            <I.Trophy c={t.accent} s={18}/><div><div style={{...f(700,18),color:t.accent,lineHeight:1}}>{overallStats.bestStreak}</div><div style={{...f(400,10),color:t.muted,marginTop:2}}>Best Streak</div></div>
          </div>
          <div style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"12px 14px",boxShadow:t.cardShadow,display:"flex",alignItems:"center",gap:10}}>
            <I.Clock c={t.accent} s={18}/><div><div style={{...f(700,18),color:t.accent,lineHeight:1}}>{overallStats.avgTime}</div><div style={{...f(400,10),color:t.muted,marginTop:2}}>Avg. Time</div></div>
          </div>
        </div>
        <div style={{padding:"20px 20px 0"}}>
          <div style={{...f(600,11),color:t.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>By Game</div>
          {Object.entries(gameStats).map(([name,gs]) => (
            <div key={name} style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:8,boxShadow:t.cardShadow}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{...f(600,14),color:t.text}}>{name}</span><span style={{...f(400,11),color:t.muted}}>{gs.played} played</span>
              </div>
              <div style={{display:"flex",gap:12}}>
                <div style={{flex:1}}><div style={{...f(400,10),color:t.muted,marginBottom:2}}>Win %</div><div style={{height:4,background:t.progressTrack,borderRadius:4,overflow:"hidden"}}><div style={{width:`${gs.winRate}%`,height:"100%",background:t.green,borderRadius:4}}/></div><div style={{...f(600,11),color:t.green,marginTop:2}}>{gs.winRate}%</div></div>
                <div style={{textAlign:"center",minWidth:50}}><div style={{...f(400,10),color:t.muted,marginBottom:2}}>Avg</div><div style={{...f(600,13),color:t.textSecondary}}>{gs.avgTime}</div></div>
                <div style={{textAlign:"center",minWidth:50}}><div style={{...f(400,10),color:t.muted,marginBottom:2}}>Best</div><div style={{...f(600,13),color:t.accent}}>{gs.bestTime}</div></div>
                <div style={{textAlign:"center",minWidth:40}}><div style={{...f(400,10),color:t.muted,marginBottom:2}}>Streak</div><div style={{...f(600,13),color:t.amber}}>{gs.streak}</div></div>
              </div>
            </div>
          ))}
        </div>
        <div style={{padding:"12px 20px 0"}}>
          <div style={{...f(600,11),color:t.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>By Genre</div>
          <div style={{display:"flex",gap:8}}>
            {Object.entries(genreBreakdown).map(([gn,gd]) => (
              <div key={gn} style={{flex:1,background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:"12px 10px",textAlign:"center",boxShadow:t.cardShadow}}>
                <div style={{...f(600,12),color:t.accent,marginBottom:6}}>{gn}</div>
                <div style={{...f(700,20),color:t.text,lineHeight:1}}>{gd.played}</div>
                <div style={{...f(400,10),color:t.muted,marginTop:2}}>played</div>
                <div style={{height:3,background:t.progressTrack,borderRadius:3,overflow:"hidden",marginTop:8}}><div style={{width:`${gd.winRate}%`,height:"100%",background:t.green,borderRadius:3}}/></div>
                <div style={{...f(500,10),color:t.green,marginTop:4}}>{gd.winRate}% win</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{padding:"20px 20px 0"}}>
          <div style={{...f(600,11),color:t.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Solo — Guess Distribution</div>
          {dist.map(d => (
            <div key={d.g} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <span style={{...f(500,13),color:t.textSecondary,width:14,textAlign:"right"}}>{d.g}</span>
              <div style={{flex:1,height:28,background:t.cardBg,borderRadius:7,border:`1px solid ${t.cardBorder}`,overflow:"hidden"}}>
                <div style={{width:`${Math.max((d.n/mx)*100,10)}%`,height:"100%",background:d.n===mx?t.gradientBtn:t.accentSoft,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:8}}>
                  <span style={{...f(600,11),color:d.n===mx?t.pillText:t.accent}}>{d.n}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{padding:"20px 20px"}}>
          <button onClick={() => navigate(SCREENS.SHARE)} style={{width:"100%",padding:"13px",borderRadius:12,background:t.gradientBtn,border:"none",...f(600,14),color:t.pillText}}>Share Results</button>
        </div>
      </Shell>
    );
  }

  // ═══════ SHARE ═══════
  if (screen === SCREENS.SHARE) return (
    <Shell title="">
      <div style={{margin:"20px",background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:18,padding:"28px 20px",textAlign:"center",boxShadow:t.cardShadow}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:4}}>
          <I.Note c={t.accent} s={18}/>
          <span className="grad-text" style={{...f(700,28),background:t.gradient,display:"inline-block"}}>Riff</span>
        </div>
        <div style={{...f(400,12),color:t.muted,marginBottom:16}}>Puzzle #42 — {dateStr}</div>
        <div style={{...f(400,14),color:t.textSecondary,marginBottom:20}}>Share your results with friends</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          {["Copy","WhatsApp","X"].map(b => (
            <button key={b} style={{padding:"9px 20px",borderRadius:10,background:b==="Copy"?t.gradientBtn:"transparent",border:b==="Copy"?"none":`1px solid ${t.cardBorder}`,...f(500,12),color:b==="Copy"?t.pillText:t.textSecondary}}>{b}</button>
          ))}
        </div>
      </div>
      <SpotifyInvite/>
    </Shell>
  );

  // ═══════ AUTH ═══════
  if (screen === SCREENS.AUTH) return (
    <Shell title="">
      <div style={{padding:"40px 24px",textAlign:"center"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:6}}>
          <I.Note c={t.accent} s={20}/>
          <h1 className="grad-text" style={{...f(700,38),margin:0,lineHeight:1,background:t.gradient,display:"inline-block"}}>Riff</h1>
        </div>
        <p style={{...f(400,13),color:t.muted,marginBottom:32}}>Sign in to save your stats and streaks</p>
        <input type="email" placeholder="Email address" style={{width:"100%",padding:"13px 16px",borderRadius:12,background:t.inputBg,border:`1px solid ${t.inputBorder}`,...f(400,14),color:t.text,outline:"none",boxSizing:"border-box",marginBottom:12}}/>
        <button style={{width:"100%",padding:"13px",borderRadius:12,background:t.gradientBtn,border:"none",...f(600,14),color:t.pillText,marginBottom:20}}>Continue with email</button>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}><div style={{flex:1,height:1,background:t.divider}}/><span style={{...f(400,12),color:t.muted}}>or</span><div style={{flex:1,height:1,background:t.divider}}/></div>
        <button style={{width:"100%",padding:"13px",borderRadius:12,background:t.cardBg,border:`1px solid ${t.cardBorder}`,...f(500,14),color:t.text,display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:t.cardShadow}}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
      </div>
    </Shell>
  );

  // ═══════ HOW TO PLAY ═══════
  if (screen === SCREENS.HOW) {
    const sections = [
      {title:"Crosswords",body:"Fill the grid using across and down clues. Click a cell and type. Click again to switch direction. Tap the info icon on any clue for a hint."},
      {title:"Groove",body:"Tap letters to select them in order, forming a word. Press Submit to check. Green = found. Red = wrong. Find all 8 words."},
      {title:"Solo",body:"Guess the 5-letter word in 6 tries. Type or tap the keyboard. Green = right letter, right spot. Yellow = right letter, wrong spot. Gray = not in the word."},
      {title:"Mini",body:"A 5x5 crossword. Click cells and type. Same controls as Crosswords but faster."},
    ];
    return (
      <Shell title="How to Play">
        <div style={{padding:"20px"}}>
          {sections.map((s,i) => (
            <div key={i} style={{marginBottom:12,padding:"16px",background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:14,boxShadow:t.cardShadow}}>
              <div style={{...f(600,15),color:t.accent,marginBottom:6}}>{s.title}</div>
              <div style={{...f(400,13),color:t.textSecondary,lineHeight:1.6}}>{s.body}</div>
            </div>
          ))}
        </div>
      </Shell>
    );
  }

  // ═══════ PROFILE ═══════
  if (screen === SCREENS.PROFILE) return (
    <Shell title="Me">
      <div style={{padding:"20px",textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:20,background:t.gradientSoft,border:`2px solid ${t.accentBorder}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",...f(700,28),color:t.accent}}>A</div>
        <div style={{...f(600,18),color:t.text,marginBottom:2}}>Alex</div>
        <div style={{...f(400,12),color:t.muted,marginBottom:20}}>Free tier</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
          {[{l:"Played",v:"87"},{l:"Streak",v:"12"},{l:"Win %",v:"94"}].map(s => (
            <div key={s.l} style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"12px 8px",boxShadow:t.cardShadow}}>
              <div style={{...f(700,20),color:t.accent}}>{s.v}</div><div style={{...f(400,10),color:t.muted,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
        {[{l:"Settings",g:SCREENS.SETTINGS},{l:"Sign in",g:SCREENS.AUTH}].map(item => (
          <button key={item.l} onClick={() => navigate(item.g)} style={{width:"100%",padding:"13px 16px",borderRadius:12,marginBottom:8,background:t.cardBg,border:`1px solid ${t.cardBorder}`,...f(500,14),color:t.text,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:t.cardShadow}}>
            <span>{item.l}</span><I.Arrow c={t.muted} s={14}/>
          </button>
        ))}
      </div>
    </Shell>
  );

  // ═══════ SETTINGS ═══════
  if (screen === SCREENS.SETTINGS) {
    const Row = ({label,toggle,on,onClick}) => (
      <div onClick={onClick} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0",borderBottom:`1px solid ${t.divider}`,cursor:onClick?"pointer":"default"}}>
        <span style={{...f(400,14),color:t.text}}>{label}</span>
        {toggle ? <Toggle on={on}/> : onClick ? <I.Arrow c={t.muted} s={14}/> : null}
      </div>
    );
    return (
      <Shell title="Settings">
        <div style={{padding:"8px 20px"}}>
          <div style={{...f(600,10),color:t.muted,letterSpacing:"0.1em",textTransform:"uppercase",padding:"16px 0 4px"}}>Appearance</div>
          <Row label="Dark Mode" toggle on={darkMode} onClick={() => setDarkMode(!darkMode)}/>
          <div style={{...f(600,10),color:t.muted,letterSpacing:"0.1em",textTransform:"uppercase",padding:"20px 0 4px"}}>Notifications</div>
          <Row label="Daily Puzzles" toggle on={true}/>
          <div style={{...f(600,10),color:t.muted,letterSpacing:"0.1em",textTransform:"uppercase",padding:"20px 0 4px"}}>Puzzle</div>
          <Row label="Skip filled squares" toggle on={true}/>
          <Row label="Show Timer" toggle on={true}/>
          <Row label="High Contrast Mode" toggle on={false}/>
          <div style={{...f(600,10),color:t.muted,letterSpacing:"0.1em",textTransform:"uppercase",padding:"20px 0 4px"}}>Support</div>
          <Row label="Help Center" onClick={() => {}}/>
          <Row label="Feedback" onClick={() => {}}/>
          <button style={{width:"100%",padding:"13px",borderRadius:12,marginTop:24,background:"transparent",border:`1px solid ${darkMode?"#442222":"#FECACA"}`,...f(500,14),color:"#EF4444"}}>Log Out</button>
        </div>
      </Shell>
    );
  }

  // ═══════ ARCHIVE ═══════
  if (screen === SCREENS.ARCHIVE) {
    const daysInMonth = 30;
    const solved = [1,2,3,4,5,6,7,8]; const perfect = [1,3,5,7];
    return (
      <Shell title="Back Catalog">
        <div style={{padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <I.Chev c={t.muted} s={20} dir="left"/>
            <span style={{...f(600,15),color:t.text}}>April 2026</span>
            <I.Chev c={t.muted} s={20} dir="right"/>
          </div>
          <div style={{display:"flex",gap:2,background:t.pillBg,borderRadius:10,padding:3,border:`1px solid ${t.divider}`,marginBottom:16}}>
            {["Cross","Solo","Groove","Mini"].map((g,i) => (
              <button key={g} style={{flex:1,padding:"7px 2px",borderRadius:8,background:i===0?t.pillActive:"transparent",border:"none",...f(i===0?600:400,11),color:i===0?t.pillText:t.muted}}>{g}</button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
            {["S","M","T","W","T","F","S"].map((d,i) => <div key={i} style={{textAlign:"center",...f(500,10),color:t.muted,padding:"4px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {[0,0,0].map((_,i) => <div key={`e${i}`}/>)}
            {Array.from({length:daysInMonth},(_,i)=>i+1).map(day => {
              const s = solved.includes(day); const p = perfect.includes(day);
              const td = day === today.getDate();
              return (
                <div key={day} style={{aspectRatio:"1",borderRadius:8,background:p?t.gradientBtn:s?t.accentSoft:t.cardBg,border:`1px solid ${td?t.accent:s?t.accentBorder:t.cardBorder}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                  <span style={{...f(500,12),color:p?t.pillText:s?t.accent:(day>today.getDate()?t.muted:t.textSecondary),opacity:day>today.getDate()?.3:1}}>{day}</span>
                </div>
              );
            })}
          </div>
        </div>
      </Shell>
    );
  }

  return <Shell title="Riff"><div style={{padding:40,textAlign:"center",color:t.muted}}>Not found</div></Shell>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
